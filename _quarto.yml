project:
  type: website  
  output-dir: doc
  render: 
    - "*.qmd"
    - "CODE_OF_CONDUCT.md"
    - "!profile/"

website:
  title: "The RESQUE<br>Framework"
  site-url: "https://resque-framework.github.io/website/"
  page-navigation: true
  navbar:
    search: true
    background: light
    left:
      - applicants.qmd
      - committees.qmd
      - text: "📔 Publications"
        file: publications.qmd
      - eval_projects.qmd      
      - team.qmd
      - text: "⎔ Technical documentation"
        file: tech_docs.qmd

  sidebar:
    - title: "👩‍🔬 For applicants"
      style: "docked"
      background: light
      contents:
        - section: "**Quicklinks**"
          contents:
            - text: "Go to the Collector App"
              href: https://resque-framework.github.io/collector-app/
            - text: "Go to the Profile Builder"
              href: https://shiny.psy.lmu.de/felix/RESQUE_profile/
    - title: "📔 Publications"
      style: "docked"
      background: light
      contents:
        - text: "👇 Select the category: 👇<br><br>"
        - text: "📔 Publications"
          file: publications.qmd
        - text: "💬 Commentaries"  
          file: publications/Commentaries.qmd
        - text: "📊 Presentations"
          file: publications/Presentations.qmd
    - title: "⎔ Technical documentation"
      style: "docked"
      background: light
      contents:        
        - text: "General information"
          file: tech_docs.qmd
        - text: "Computation of Relative Rigor Score (RRS)"
          file: tech_doc/RRS.qmd
        - text: "Customization of RESQUE"
          file: tech_doc/customization.qmd
        - text: "<br><b>Core Packs:</b><br><br>"
        - text: "&nbsp;&nbsp;Indicators for Publications"
          file: tech_doc/pub_indicators.qmd
        - text: "&nbsp;&nbsp;Indicators for Data Sets"  
          file: tech_doc/data_indicators.qmd
        - text: "&nbsp;&nbsp;Indicators for Research Software"
          file: tech_doc/software_indicators.qmd
        - text: "<br><b>Expansion Packs:</b><br><br>"
        - text: "&nbsp;&nbsp;Clinical Psychology"  
          file: tech_doc/EP-clinical_psychology.qmd
        - text: "&nbsp;&nbsp;Theory-guided research and theory development"
          file: tech_doc/EP-theorizing.qmd
        - text: "&nbsp;&nbsp;Epistemic Goals"  
          file: tech_doc/EP-epistemic_goals.qmd
        - text: "&nbsp;&nbsp;Multi-/Interdisciplinarity"  
          file: tech_doc/EP-multidisciplinary.qmd
        - text: "&nbsp;&nbsp;Practical Relevance"  
          file: tech_doc/EP-practical_relevance.qmd
        - text: "&nbsp;&nbsp;Stimuli"  
          file: tech_doc/EP-stimuli.qmd

format:
  html:
    theme: cosmo
    css: 
      - css/styles.css
      - css/faq.css
      - css/action_button.css
    toc: false
    include-in-header: includes/matomo.html
